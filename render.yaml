services:
  - type: web
    name: deepraj-mail-pro-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true    # Render generates 32-char hex key
      - key: DATABASE_URL
        fromDatabase:
          name: deepraj-mail-pro-db
          property: connectionString
      - key: BACKEND_URL
        sync: false            # Set manually in dashboard to backend service URL
      - key: CORS_ORIGINS
        sync: false            # Set manually to frontend Vercel origin (comma separated)
      - key: ADMIN_EMAIL
        sync: false            # Set manually to default admin email
      - key: ADMIN_PASSWORD
        sync: false            # Set manually to default admin password
      - key: NODE_ENV
        value: production

databases:
  - name: deepraj-mail-pro-db
    plan: free
    databaseName: deeprajmailpro
